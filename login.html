<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>會員登入 | LOHAS 樂活眼鏡</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* 登入頁專屬微調樣式 */
        .login-section {
            padding: 100px 20px;
            max-width: 400px;
            margin: 0 auto;
            text-align: center;
        }
        .login-card {
            background: #fff;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }
        .btn-login {
            width: 100%;
            padding: 12px;
            background-color: #000; /* 配合專案黑色系 */
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.3s;
        }
        .btn-login:hover {
            background-color: #333;
        }
        #error-message {
            color: #ff4d4f;
            margin-top: 15px;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <header>
        <nav>
            <a href="index.html"><img src="images/lohas-logo.svg" alt="LOHAS" width="120"></a>
        </nav>
    </header>

    <main class="login-section">
        <div class="login-card">
            <h2>會員登入</h2>
            <p>請輸入您的帳號密碼</p>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="account">帳號</label>
                    <input type="text" id="account" placeholder="請輸入手機或帳號" required>
                </div>
                <div class="form-group">
                    <label for="password">密碼</label>
                    <input type="password" id="password" placeholder="請輸入密碼" required>
                </div>
                <button type="submit" class="btn-login">立即登入</button>
            </form>

            <div id="error-message"></div>
        </div>
    </main>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const account = document.getElementById('account').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error-message');

            // 根據 API 文件定義的請求結構
            const payload = {
                "apikey": "bfjY2jssj9dDajq0", // 正式環境 Key
                "apiver": "0.1.0",
                "data": {
                    "account": account,
                    "password": password
                }
            };

            // 建議修改 script 中的 fetch 部分
try {
    const response = await fetch('https://lohas.realtime.tw/webapi/v010/officialWed/login', { // 請確認 Wed 或 Web
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify(payload)
    });

    // 如果 response.ok 為 false (例如 404, 500)，也會在這裡處理
    if (!response.ok) {
        throw new Error(`HTTP error! status: ${response.status}`);
    }

    const result = await response.json();
    console.log('API Response:', result); // 增加 log 查看完整回傳

    if (result.code === "200") {
        alert(`登入成功！歡迎回來，${result.data.erpname}`);
        localStorage.setItem('isLoggedIn', 'true');
        localStorage.setItem('erpid', result.data.erpid);
        localStorage.setItem('erpname', result.data.erpname);
        window.location.href = 'index.html';
    } else {
        errorDiv.innerText = result.message || '登入失敗，請檢查帳號密碼';
    }
} catch (error) {
    console.error('詳細錯誤資訊:', error);
    // 檢查是否為 CORS 錯誤
    if (error.message.includes('Failed to fetch')) {
        errorDiv.innerText = '連線被瀏覽器攔截 (可能是 CORS 跨域問題)';
    } else {
        errorDiv.innerText = '系統連線異常：' + error.message;
    }
}
        });
    </script>
</body>
</html>
