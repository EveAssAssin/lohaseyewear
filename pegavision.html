<main>
  <div class="pega-page">

      <!-- 圖片由 supabase site_settings (key=pegavision_page) 動態載入 -->
      <div class="pega-placeholder" id="pegaPlaceholder">
        <i class="fa-regular fa-image"></i>
        <p>專頁內容準備中，敬請期待。</p>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script>
(function () {
  'use strict';

  async function loadPegaPage() {
    const sb = window.LohasSupabase
      && window.LohasSupabase.getClient
      && window.LohasSupabase.getClient();
    if (!sb) return;

    try {
      const { data, error } = await sb
        .from('site_settings')
        .select('value')
        .eq('key', 'pegavision_page')
        .maybeSingle();

      if (error || !data || !data.value) return;

      const cfg = data.value;
      const imgUrl = cfg.image_url;

      if (!imgUrl) return;

      const wrap = document.getElementById('pegaImageWrap');
      if (!wrap) return;

      wrap.innerHTML = '<img src="' + imgUrl + '" alt="晶碩隱形眼鏡 PEGAVISION">';
    } catch (e) {
      console.warn('[pegavision] 載入失敗:', e);
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', loadPegaPage);
  } else {
    loadPegaPage();
  }
})();
</script>
</body>
