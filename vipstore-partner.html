<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="google" content="notranslate">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>成為特約商家 · 樂活眼鏡</title>
  <meta name="description" content="加入樂活商店街,將您的優惠曝光給全台 LOHAS 會員,並透過全省合作門市網絡為店家導流。">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <link rel="stylesheet" href="css/lohas-tokens.css?v=20260527-1200">
  <link rel="stylesheet" href="css/lohas-base.css?v=20260527-1200">
  <link rel="stylesheet" href="css/lohas-components.css?v=20260527-1200">
  <link rel="stylesheet" href="css/vipstore-coming.css?v=20260527-1200">
</head>
<body data-page="vipstore-partner">

<!-- 全站 Header (由 layout.js 從 components/header.html 載入) -->
<div id="site-header"></div>

<main>
  <div class="vsc-shell">

    <!-- 中央內容區 -->
    <section class="vsc-center">
      <div class="vsc-inner">

        <!-- 麵包屑 -->
        <nav class="vsc-crumb">
          <a href="vipstore.html">樂活商店街</a>
          <i class="fa-solid fa-chevron-right"></i>
          <span>成為特約商家</span>
        </nav>

        <!-- 主視覺 -->
        <div class="vsc-icon">
          <i class="fa-solid fa-handshake-angle"></i>
        </div>

        <span class="vsc-eb">FOR BUSINESS</span>

        <h1 class="vsc-title">特約商家專頁<br>建構中</h1>

        <p class="vsc-desc">
          一條由商家共同串起的街。<br>
          歡迎您把店面、品牌、好東西,介紹給我們的會員。<br>
          完整的特約商家方案頁面即將上線。
        </p>

        <!-- 重點預告 -->
        <ul class="vsc-list">
          <li><i class="fa-solid fa-check"></i> 加入特約商家的三大效益</li>
          <li><i class="fa-solid fa-check"></i> 樂活會員人口與門市網絡資料</li>
          <li><i class="fa-solid fa-check"></i> 申請流程與審核時程</li>
          <li><i class="fa-solid fa-check"></i> 已加入特約商家見證分享</li>
        </ul>

        <!-- 主 CTA - 直接連申請表 -->
        <div class="vsc-btns">
          <a href="https://lohas.realtime.tw/contract" class="vsc-btn vsc-btn--solid" target="_blank" rel="noopener noreferrer">
            申 請 成 為 特 約 商 家
            <i class="fa-solid fa-arrow-right-long"></i>
          </a>
          <a href="vipstore.html" class="vsc-btn vsc-btn--ghost">
            <i class="fa-solid fa-arrow-left"></i>
            回 商 店 街
          </a>
        </div>

        <!-- 小提示 -->
        <p class="vsc-hint">
          已準備好申請嗎?可直接前往
          <a href="https://lohas.realtime.tw/contract" target="_blank" rel="noopener noreferrer">特約商家申請表</a>
          填寫資料,我們將盡快與您聯繫。
        </p>

      </div>
    </section>

  </div>
</main>

<!-- 全站 Footer (由 layout.js 從 components/footer.html 載入) -->
<div id="site-footer"></div>

<!-- 全站 layout -->
<script src="js/layout.js?v=20260527-1200"></script>

</body>
</html>
