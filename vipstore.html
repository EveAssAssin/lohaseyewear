<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="google" content="notranslate">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>樂活商店街 · LOHAS 樂活眼鏡</title>
  <meta name="description" content="樂活會員專屬商店街。全台特約店家會員優惠，憑會員身份立享專屬折扣。">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin="">

  <!-- LOHAS CSS · 載入順序：tokens → base → components → page -->
  <link rel="stylesheet" href="css/lohas-tokens.css?v=20260520-1500">
  <link rel="stylesheet" href="css/lohas-base.css?v=20260520-1500">
  <link rel="stylesheet" href="css/lohas-components.css?v=20260520-1500">
  <link rel="stylesheet" href="css/vipstore.css?v=20260520-1500">
</head>
<body data-page="vipstore">

<!-- 全站 Header (由 layout.js 從 components/header.html 載入) -->
<div id="site-header"></div>

<main>
  <div class="vs-shell">

    <!-- 子頁頭：標題 + 搜尋 + 類別 chip -->
    <header class="vs-subheader">
      <div class="vs-subheader-inner">

        <div class="vs-subheader-title">
          <i class="fa-solid fa-store"></i>
          <span class="accent">樂活商店街</span>
          <span class="vs-subheader-desc">· 會員專屬特約優惠 · <b id="vsTotalCount">--</b> 間店家</span>

          <div class="vs-search">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="search" id="vs-search" placeholder="搜尋店家名稱、類別、介紹">
          </div>

          <!-- View 切換 (電腦版 ≥769px 顯示) -->
          <div class="vs-view-switch" id="vs-view-switch">
            <button class="vs-view-btn" data-view="map" type="button">
              <i class="fa-solid fa-map-location-dot"></i><span>地圖</span>
            </button>
            <button class="vs-view-btn is-active" data-view="browse" type="button">
              <i class="fa-solid fa-grip"></i><span>列表</span>
            </button>
          </div>
        </div>

        <!-- 手機版 KPI 三指標卡片 (電腦版隱藏) -->
        <div class="vs-kpi" aria-hidden="true">
          <div class="vs-kpi-cell">
            <div class="vs-kpi-num" id="vsKpiUnits">--</div>
            <div class="vs-kpi-lab">特約店家</div>
          </div>
          <div class="vs-kpi-cell">
            <div class="vs-kpi-num" id="vsKpiStores">--</div>
            <div class="vs-kpi-lab">合作門市</div>
          </div>
          <div class="vs-kpi-cell">
            <div class="vs-kpi-num" id="vsKpiCats">--</div>
            <div class="vs-kpi-lab">類別</div>
          </div>
        </div>

        <!-- 類別 chip 列（橫向滾動） -->
        <div class="vs-cats" id="vs-cats">
          <button class="vs-chip is-active" data-cat="all">
            <i class="fa-solid fa-bolt"></i><span>全部</span>
          </button>
          <!-- 其他類別由 vipstore.js 從 API 回傳的 category_name 動態 render -->
        </div>

      </div>
    </header>

    <!-- 主體 (data-view 切換: browse=列表瀏覽 / map=地圖) -->
    <div class="vs-layout" id="vs-layout" data-view="browse">

      <!-- ========= View 1: Browse (列表瀏覽,預設) ========= -->
      <section class="vs-browse" id="vs-browse">
        <div class="vs-browse-inner">
          <div class="vs-browse-loading vs-loading">載入中…</div>
          <!-- 類別 section 由 JS render -->
        </div>
      </section>

      <!-- ========= View 2: Map (地圖) ========= -->
      <div class="vs-map-view" id="vs-map-view">

        <!-- 左：店家列表 -->
        <aside class="vs-list-panel">

          <div class="vs-list-head">
            <div>
              <h1 class="vs-list-title">特約店家</h1>
              <p class="vs-list-sub">會員專屬·點店家可查看合作門市</p>
            </div>
            <button class="vs-sort" type="button" id="vs-sort">
              <i class="fa-solid fa-arrow-down-wide-short"></i> 依距離
            </button>
          </div>

          <div class="vs-list" id="vs-list">
            <div class="vs-loading">載入中…</div>
          </div>

        </aside>

        <!-- 右：地圖 -->
        <div class="vs-map-panel">

          <div id="vs-map-canvas"></div>

          <!-- 工具按鈕 -->
          <div class="vs-map-tools">
            <button class="vs-map-tool" type="button" data-action="locate" title="我的位置">
              <i class="fa-solid fa-location-crosshairs"></i>
            </button>
            <button class="vs-map-tool" type="button" data-action="zoom-in" title="放大">
              <i class="fa-solid fa-plus"></i>
            </button>
            <button class="vs-map-tool" type="button" data-action="zoom-out" title="縮小">
              <i class="fa-solid fa-minus"></i>
            </button>
          </div>

          <!-- 底部計數 -->
          <div class="vs-map-count" id="vs-map-count">
            <i class="fa-solid fa-circle"></i> 目前顯示 <b>--</b> 間特約店家
          </div>

          <!-- 點 pin 彈出的卡片 -->
          <div class="vs-pin-card" id="vs-pin-card"></div>

        </div>

      </div>

    </div>

  </div>

  <!-- ========= 商家詳情浮層 (點卡片時開啟) ========= -->
  <div class="vs-detail-ovl" id="vs-detail-ovl" aria-hidden="true">
    <div class="vs-detail-modal" id="vs-detail-modal" role="dialog" aria-modal="true">
      <!-- 內容由 JS render -->
    </div>
  </div>

  <!-- 手機底部 TAB（列表 / 地圖） -->
  <div class="vs-view-tabs" id="vs-view-tabs">
    <button class="vs-view-tab is-active" data-view="browse" type="button">
      <i class="fa-solid fa-grip"></i>
      <span>列表</span>
    </button>
    <button class="vs-view-tab" data-view="map" type="button">
      <i class="fa-solid fa-map-location-dot"></i>
      <span>地圖</span>
    </button>
  </div>

</main>

<!-- 全站 Footer -->
<div id="site-footer"></div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
        crossorigin=""></script>

<!-- 全站 layout -->
<script src="js/layout.js?v=20260520-1500"></script>

<!-- API 模組（依賴關係：core → store / vipstore） -->
<script src="js/api/api-core.js?v=20260520-1500"></script>
<script src="js/api/api-store.js?v=20260520-1500"></script>
<script src="js/api/api-vipstore.js?v=20260520-1500"></script>

<!-- 資料正規化 -->
<script src="js/store-data.js?v=20260520-1500"></script>

<!-- 頁面邏輯 -->
<script src="js/vipstore.js?v=20260520-1500"></script>

<!-- 管理員工具:API mode 切換器 (URL 加 ?lohas-debug 或按 Ctrl+Shift+M 顯示) -->
<script src="js/api-mode-switch.js?v=20260520-1500"></script>

</body>
</html>
