<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>選擇預約門市 - LOHAS 樂活眼鏡</title>
  <meta name="description" content="選擇您要預約的樂活眼鏡門市，全台 24 間實體門市，海外 1 間旗艦店。線上預約專屬驗光師，享 NT$200 預約折抵。">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">

  <!-- Leaflet CSS（必須在頁面 CSS 之前載入） -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin="">

  <!-- LOHAS CSS · 載入順序：tokens → base → components → store-components → page -->
  <link rel="stylesheet" href="css/lohas-tokens.css?v=20260517-1800">
  <link rel="stylesheet" href="css/lohas-base.css?v=20260517-1800">
  <link rel="stylesheet" href="css/lohas-components.css?v=20260517-1800">
  <link rel="stylesheet" href="css/store-components.css?v=20260517-1800">
  <link rel="stylesheet" href="css/allstore.css?v=20260517-1800">
</head>
<body>

<div id="site-header"></div>

<main>
  <div class="as-shell">

    <header class="as-subheader">
      <div class="as-subheader-inner">
        <div class="as-subheader-title">
          <i class="fa-regular fa-calendar-check"></i>
          <span class="accent">選擇預約門市</span>
          <span>· 全台 <b>24</b> 間 + 海外 <b>1</b> 間</span>
        </div>
        <div class="as-search">
          <i class="fa-solid fa-magnifying-glass"></i>
          <input type="search" id="as-search" placeholder="輸入縣市、地址、門市名稱">
        </div>
        <div class="as-regions" id="as-regions"></div>
      </div>
    </header>

    <div class="as-layout" id="as-layout">

      <aside class="as-list-panel">
        <div class="as-list" id="as-store-list"></div>
      </aside>

      <div class="as-map-panel">
        <div id="as-map-canvas"></div>
        <div class="as-pin-card" id="as-pin-card"></div>
      </div>

    </div>

  </div>

  <!-- 手機版底部切換 FAB -->
  <button class="as-view-toggle" id="as-view-toggle" type="button">
    <i class="fa-solid fa-map-location-dot"></i>
    <span id="as-view-toggle-text">地圖</span>
  </button>
</main>

<div id="site-footer"></div>

<!-- Leaflet JS（必須先於 allstore.js 載入） -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
        crossorigin=""></script>

<!-- BFF 版：前端不再做 AES，CryptoJS 移除（加密改在 Supabase Edge Function 做）-->

<!-- 全站 layout -->
<script src="js/layout.js?v=20260517-1800"></script>

<!-- API 模組 -->
<script src="js/api/api-core.js?v=20260517-1800"></script>
<script src="js/api/api-store.js?v=20260517-1800"></script>

<!-- 資料正規化 -->
<script src="js/store-data.js?v=20260517-1800"></script>

<!-- 頁面邏輯 -->
<script src="js/allstore.js?v=20260517-1800"></script>

</body>
</html>
