<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>選擇預約門市 - LOHAS 樂活眼鏡</title>
  <meta name="description" content="選擇您要預約的樂活眼鏡門市，全台 24 間實體門市，海外 1 間旗艦店。線上預約專屬驗光師，享 NT$200 預約折抵。">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Noto+Serif+TC:wght@500;600&display=swap" rel="stylesheet">

  <!-- LOHAS CSS · 載入順序：tokens → base → components → store-components → page -->
  <link rel="stylesheet" href="css/lohas-tokens.css?v=20260517-1000">
  <link rel="stylesheet" href="css/lohas-base.css?v=20260517-1000">
  <link rel="stylesheet" href="css/lohas-components.css?v=20260517-1000">
  <link rel="stylesheet" href="css/store-components.css?v=20260517-1000">
  <link rel="stylesheet" href="css/allstore.css?v=20260517-1000">
</head>
<body>

<div id="site-header"></div>

<main>
  <div class="as-shell">

    <!-- 副標頭：強調這頁是預約入口 -->
    <header class="as-subheader">
      <div class="as-subheader-inner">
        <div class="as-subheader-title">
          <i class="fa-regular fa-calendar-check"></i>
          <span class="accent">選擇預約門市</span>
          <span>· 全台 <b>24</b> 間 + 海外 <b>1</b> 間</span>
        </div>
        <div class="as-subheader-actions">
          <button class="as-subheader-btn">
            <i class="fa-solid fa-location-arrow"></i> 我附近的門市
          </button>
          <button class="as-subheader-btn primary" data-member-link>會員專區</button>
        </div>
      </div>
    </header>

    <!-- 主體：左列表 / 右地圖 -->
    <div class="as-layout">

      <!-- 左 panel -->
      <aside class="as-panel">
        <div class="as-panel-head">
          <h1 class="as-panel-title">
            <i class="fa-regular fa-calendar-check"></i>選擇預約門市
          </h1>
          <div class="as-panel-count" id="as-result-count">載入中…</div>
          <div class="as-search">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="search" id="as-search" placeholder="輸入縣市、地址、門市名稱">
          </div>
          <div class="as-regions" id="as-regions">
            <!-- 由 JS 動態渲染 region pills -->
          </div>
        </div>
        <div class="as-store-list" id="as-store-list">
          <!-- 由 JS 動態渲染 -->
        </div>
      </aside>

      <!-- 右地圖 -->
      <div class="as-map">
        <div class="as-map-grid"></div>

        <!-- 台灣輪廓 SVG（viewBox 對應經度 119.5-122.5、緯度 21.5-25.5）-->
        <svg class="as-map-svg" viewBox="0 0 300 400" preserveAspectRatio="xMidYMid meet"
             xmlns="http://www.w3.org/2000/svg" aria-hidden="true" style="pointer-events:auto;">
          <!-- 投影註：x = (lng-119.5)/3.0 * 300, y = (25.5-lat)/4.0 * 400 -->
          <!-- 海岸線陰影 -->
          <g class="land-shadow" transform="translate(2,6)">
            <path d="M 178,42 Q 196,52 207,72 Q 214,98 219,128 Q 224,158 226,188 Q 224,222 216,256 Q 204,286 188,312 Q 172,336 154,352 Q 138,360 124,358 Q 116,344 112,326 Q 110,302 108,278 Q 106,250 104,222 Q 102,192 102,162 Q 104,132 110,104 Q 122,76 138,58 Q 156,46 178,42 Z"/>
          </g>
          <!-- 台灣本島 -->
          <path class="land" d="
            M 178,42
            Q 188,46 198,56
            Q 207,68 212,82
            Q 218,102 222,124
            Q 226,148 228,172
            Q 229,198 226,224
            Q 222,250 213,274
            Q 202,298 188,318
            Q 174,335 158,348
            Q 144,357 130,358
            Q 120,354 116,342
            Q 112,326 110,308
            Q 108,288 106,268
            Q 104,244 102,220
            Q 100,194 102,168
            Q 104,140 110,114
            Q 118,90 130,72
            Q 144,56 160,48
            Q 170,44 178,42
            Z
          "/>
          <!-- 中央山脈陰影 -->
          <path class="mountain" d="
            M 158,90
            Q 170,100 178,120
            Q 184,150 186,180
            Q 184,210 178,240
            Q 170,268 158,290
            Q 152,300 146,302
            Q 140,290 138,272
            Q 136,246 138,220
            Q 140,190 144,162
            Q 148,132 152,108
            Q 155,96 158,90
            Z
          "/>
          <!-- 海岸虛線 -->
          <path class="coastline" d="
            M 178,38 Q 200,50 214,76 Q 224,108 230,148 Q 232,194 226,238 Q 216,278 198,308 Q 178,334 158,350"
          />

          <!-- 城市標籤（直接畫在 SVG 內，跟著一起縮放）-->
          <g class="map-cities" style="pointer-events:none;">
            <text x="159" y="64"  class="city major">台 北</text>
            <text x="138" y="100" class="city">桃 園</text>
            <text x="128" y="128" class="city">新 竹</text>
            <text x="138" y="200" class="city major">台 中</text>
            <text x="148" y="252" class="city">嘉 義</text>
            <text x="153" y="290" class="city">台 南</text>
            <text x="160" y="326" class="city major">高 雄</text>
            <text x="220" y="222" class="city">花 蓮</text>
            <text x="216" y="316" class="city">台 東</text>
          </g>

          <!-- Pin 容器（由 JS 渲染 SVG 元素插入此處）-->
          <g id="as-pins"></g>
        </svg>

        <div class="as-map-hint" id="as-map-hint">
          <span class="badge">RESERVATION · 線上預約</span>
          <h3>選擇您的預約門市</h3>
          <p>
            <i class="fa-solid fa-hand-pointer"></i>從左側列表或地圖上點選任一間門市，<br>
            查看可預約時段與專屬驗光師。
          </p>
        </div>

        <div class="as-map-controls">
          <button class="as-map-ctrl" aria-label="放大"><i class="fa-solid fa-plus"></i></button>
          <button class="as-map-ctrl" aria-label="縮小"><i class="fa-solid fa-minus"></i></button>
          <button class="as-map-ctrl" aria-label="定位"><i class="fa-solid fa-location-crosshairs"></i></button>
        </div>

        <div class="as-map-legend">
          <div class="as-map-legend-row"><span class="as-map-legend-dot flag"></span>旗艦門市</div>
          <div class="as-map-legend-row"><span class="as-map-legend-dot reg"></span>一般門市</div>
          <div class="as-map-legend-row"><span class="as-map-legend-dot act"></span>目前選取</div>
        </div>

        <div class="as-pin-card" id="as-pin-card"></div>
      </div>

    </div>

  </div>
</main>

<div id="site-footer"></div>

<!-- 依賴：CryptoJS 處理 AES 加解密 -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>

<!-- 全站 layout -->
<script src="js/layout.js?v=20260517-1000"></script>

<!-- API 模組（順序：core → store） -->
<script src="js/api/api-core.js?v=20260517-1000"></script>
<script src="js/api/api-store.js?v=20260517-1000"></script>

<!-- 資料正規化 -->
<script src="js/store-data.js?v=20260517-1000"></script>

<!-- 頁面邏輯 -->
<script src="js/allstore.js?v=20260517-1000"></script>

</body>
</html>
