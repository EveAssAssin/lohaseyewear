<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>最新消息｜樂活眼鏡 LOHAS EYEWEAR</title>
  <meta
    name="description"
    content="樂活眼鏡最新消息，包含品牌故事、活動優惠、雷刻服務、會員專區與官方公告。"
  />

  <!-- Font Awesome -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
  />

  <!-- 全站樣式 -->
  <!-- 最新消息頁專用樣式 -->
    <!-- LOHAS CSS · 載入順序: tokens → base → components → page -->
  <link rel="stylesheet" href="css/lohas-tokens.css">
  <link rel="stylesheet" href="css/lohas-base.css">
  <link rel="stylesheet" href="css/lohas-components.css">
  <link rel="stylesheet" href="css/news.css">

</head>

<body class="news-page">

  <!-- 共用 Header -->
  <div id="site-header"></div>

  <main class="news-main">

    

<section class="news-search-section">
  <div class="news-shell">
    <div class="news-search-box">
      <i class="fa-solid fa-magnifying-glass"></i>
      <input
        type="search"
        id="newsSearchInput"
        placeholder="搜尋消息、活動、雷刻服務..."
      />
    </div>
  </div>
</section>
    
    <!-- Featured -->
    <section class="news-featured">
      <div class="news-shell">
        <div class="news-section-head">
          <div>
            <p class="news-section-kicker">FEATURED</p>
            <h2>精選消息</h2>
          </div>
        </div>

        <article class="featured-post">
          <a href="#" class="featured-post__media">
            <img src="images/news/featured-mothers-day.jpg" alt="母親節限定雷刻企劃">
          </a>

          <div class="featured-post__body">
            <div class="post-meta">
              <span class="post-tag">活動優惠</span>
              <span class="post-date">2026.05.01</span>
            </div>

            <h3>
              <a href="#">
                母親節限定｜把想說的話刻在鏡片上
              </a>
            </h3>

            <p>
              讓眼鏡不只是日常配件，也成為承載心意的紀念品。
              指定門市與官網同步推出母親節限定雷刻企劃。
            </p>

            <a href="#" class="post-readmore">
              READ MORE
              <span>→</span>
            </a>
          </div>
        </article>
      </div>
    </section>

    <!-- Filter -->
    <section class="news-filter-section">
      <div class="news-shell">
        <div class="news-filter-wrap">
          <div class="news-filter-title">文章分類</div>

          <div class="news-filter" aria-label="最新消息分類">
            <button class="filter-btn active" data-filter="all">所有文章</button>
            <button class="filter-btn" data-filter="story">品牌故事</button>
            <button class="filter-btn" data-filter="event">活動優惠</button>
            <button class="filter-btn" data-filter="engraving">雷刻服務</button>
            <button class="filter-btn" data-filter="people">人物誌</button>
            <button class="filter-btn" data-filter="member">會員專區</button>
            <button class="filter-btn" data-filter="official">官方公告</button>
          </div>
        </div>
      </div>
    </section>

    <!-- News List -->
    <section class="news-list-section">
      <div class="news-shell">

        <div class="news-grid" id="newsGrid">
          <!-- 動態載入卡片 -->
          <div class="news-loading" id="newsLoading">
            <p style="text-align:center;color:#888;padding:60px 0">載入中...</p>
          </div>
          <div class="news-empty" id="newsEmpty" style="display:none">
            <p style="text-align:center;color:#888;padding:60px 0">尚無文章</p>
          </div>

        </div>

        <div class="news-load-more-wrap">
          <button class="load-more-btn" id="loadMoreBtn">
            更多文章
            <i class="fa-solid fa-chevron-down"></i>
          </button>
        </div>

      </div>
    </section>

  </main>

  <!-- 共用 Footer -->
  <div id="site-footer"></div>

  <!-- 共用 layout -->
  <script src="./js/layout.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./js/supabase.js"></script>
  <script src="./js/news.js?v=20260517"></script>

</body>
</html>
