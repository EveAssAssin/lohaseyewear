  <title>完成取貨預約 - LOHAS 樂活眼鏡</title>
  <meta name="description" content="從商城跳轉而來，選擇您要取貨的樂活眼鏡門市與專屬銷售顧問，完成線上預約。">
  <!-- 這是商城導流的取貨預約專用頁，不希望被搜尋引擎索引 -->
  <meta name="robots" content="noindex, nofollow">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">

  <!-- Leaflet CSS（必須在頁面 CSS 之前載入） -->

        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin="">

  <!-- LOHAS CSS · 載入順序：tokens → base → components → store-components → page -->
  <link rel="stylesheet" href="css/lohas-tokens.css?v=20260616-reserve">
  <link rel="stylesheet" href="css/lohas-base.css?v=20260616-reserve">
  <link rel="stylesheet" href="css/lohas-components.css?v=20260616-reserve">
  <link rel="stylesheet" href="css/store-components.css?v=20260616-reserve">
  <link rel="stylesheet" href="css/allstore.css?v=20260616-reserve">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="apple-touch-icon" href="favicon.svg">

  <!-- reserve 頁專屬導引條（不另開 CSS 檔，沿用全站 tokens）-->
  <style>
    .rsv-intro{
      background:var(--lohas-light,#CDBEA2);
      color:var(--lohas-brand,#50422D);
      padding:14px 20px;
      display:flex;align-items:center;gap:12px;
      font-size:15px;line-height:1.5;
      border-bottom:1px solid var(--lohas-bd,#E8DED1);
    }
    .rsv-intro i{font-size:20px;flex:0 0 auto;}
    .rsv-intro b{font-weight:700;}
    .rsv-intro .rsv-step{
      margin-left:auto;font-size:13px;opacity:.85;white-space:nowrap;
    }
    @media (max-width:640px){
      .rsv-intro{font-size:13px;padding:12px 16px;}
      .rsv-intro .rsv-step{display:none;}
    }
  </style>

  <!-- 全站追蹤碼 GA4 + Meta Pixel -->
  <script src="js/analytics.js?v=20260610-booking"></script>
</head>
<body>
<!-- Google Tag Manager (noscript) -->
<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-MSNPQ36L"
height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
<!-- End Google Tag Manager (noscript) -->

<div id="site-header"></div>

<main>
  <div class="as-shell">

    <!-- 取貨預約導引條：放在 .as-shell 內、subheader 上方，
         自動繼承 .as-shell 的 margin-top:70px，避開固定 header（桌機/手機一致）。 -->
    <div class="rsv-intro">
      <i class="fa-solid fa-bag-shopping"></i>
      <span>您正在<b>完成商城訂單的門市取貨預約</b>，請先選擇取貨門市，下一步再指定銷售顧問與時段。</span>
      <span class="rsv-step">① 選門市 → ② 選顧問 → ③ 選時段 → 完成</span>
    </div>

    <header class="as-subheader">
      <div class="as-subheader-inner">
        <div class="as-subheader-title">
          <i class="fa-regular fa-calendar-check"></i>
          <span class="accent">選擇取貨門市</span>
          <span>· 全台 <b>24</b> 間 + 海外 <b>1</b> 間</span>
        </div>
        <div class="as-search">
          <i class="fa-solid fa-magnifying-glass"></i>
          <input type="search" id="as-search" placeholder="輸入縣市、地址、門市名稱">
        </div>
        <div class="as-regions" id="as-regions"></div>
      </div>
    </header>

    <div class="as-layout" id="as-layout">

      <aside class="as-list-panel">
        <div class="as-list" id="as-store-list"></div>
      </aside>

      <div class="as-map-panel">
        <div id="as-map-canvas"></div>
        <div class="as-pin-card" id="as-pin-card"></div>
      </div>

    </div>

  </div>

  <!-- 手機版底部 TAB 切換（地圖 / 列表） -->
  <div class="as-view-tabs" id="as-view-tabs">
    <button class="as-view-tab active" data-view="list" type="button">
      <i class="fa-solid fa-list-ul"></i>
      <span>列表</span>
    </button>
    <button class="as-view-tab" data-view="map" type="button">
      <i class="fa-solid fa-map-location-dot"></i>
      <span>地圖</span>
    </button>
  </div>
</main>

<div id="site-footer"></div>

<!-- Leaflet JS（必須先於 allstore.js 載入） -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
        crossorigin=""></script>

<!-- BFF 版：前端不做 AES，加密在 Supabase Edge Function（lohas-api-proxy）做 -->

<!-- 全站 layout -->
<script src="js/layout.js?v=20260616-reserve"></script>

<!-- API 模組 -->
<script src="js/api/api-core.js?v=20260616-reserve"></script>
<script src="js/api/api-store.js?v=20260616-reserve"></script>

<!-- 資料正規化 -->
<script src="js/store-data.js?v=20260616-reserve"></script>

<!--
  頁面邏輯：直接沿用 allstore.js
  ───────────────────────────────────────────────
  allstore.js 已內建：
   · captureCartPrefill()  讀 ?from=cart&name&phone&cartType&cartPaymentMethod
                           → 存 sessionStorage("lohas_cart_prefill") → 清掉網址 query
   · maybeShowCartHint()   顯示「已從商城帶入您的資料」提示條
   · 門市列表 / 地圖 / 區域切換 / 搜尋
   · 點「預約」→ 跳 store.html?erpid=...#staff（在單店頁選顧問+時段+完成）
  之後 booking-modal.js 在 store.html 讀 sessionStorage 預填、完成後 AES 回傳商城。
  → reserve.html 與 allstore.js 共用同一份程式碼，未來只需維護一處，不會發生「改了沒同步」。
-->
<script src="js/allstore.js?v=20260616-reserve"></script>

</body>
</html>
