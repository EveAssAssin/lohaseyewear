  <link rel="stylesheet" href="css/lohas-base.css?v=20260616-reserve2">
  <link rel="stylesheet" href="css/lohas-components.css?v=20260616-reserve2">

  <style>
    /* reserve 落地頁：modal 會蓋在上面，這裡只放一個等待中的提示卡 */
    .rsv-stage{
      min-height:60vh;
      display:flex;align-items:center;justify-content:center;
      padding:40px 20px;
    }
    .rsv-card{
      max-width:440px;width:100%;text-align:center;
      background:#fff;border:1px solid var(--lohas-bd,#E8DED1);
      border-radius:20px;padding:40px 28px;
      box-shadow:0 10px 40px rgba(80,66,45,.08);
    }
    .rsv-card .rsv-ico{
      width:64px;height:64px;border-radius:50%;
      background:var(--lohas-light,#CDBEA2);color:var(--lohas-brand,#50422D);
      display:flex;align-items:center;justify-content:center;
      font-size:28px;margin:0 auto 18px;
    }
    .rsv-card h1{font-size:20px;color:var(--lohas-brand,#50422D);margin:0 0 8px;}
    #rsv-status-title{font-size:16px;font-weight:700;color:var(--lohas-brand,#50422D);margin:0 0 4px;}
    #rsv-status-msg{font-size:13px;color:var(--text-sub,#8a7e6d);margin:0;}
    #rsv-spinner{
      width:30px;height:30px;margin:18px auto 0;
      border:3px solid var(--lohas-light,#CDBEA2);
      border-top-color:var(--lohas-brand,#50422D);
      border-radius:50%;animation:rsvspin .8s linear infinite;
    }
    @keyframes rsvspin{to{transform:rotate(360deg)}}
  </style>

  <script src="js/analytics.js?v=20260610-booking"></script>

<body>
<!-- Google Tag Manager (noscript) -->
<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-MSNPQ36L"
height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
<!-- End Google Tag Manager (noscript) -->

<div id="site-header"></div>

<main>
  <div class="rsv-stage">
    <div class="rsv-card">
      <div class="rsv-ico"><i class="fa-solid fa-bag-shopping"></i></div>
      <h1>完成取貨預約</h1>
      <p id="rsv-status-title">正在開啟門市選擇…</p>
      <p id="rsv-status-msg">請稍候</p>
      <div id="rsv-spinner"></div>
    </div>
  </div>
</main>

<div id="site-footer"></div>

<!-- 全站 layout -->
<script src="js/layout.js?v=20260616-reserve2"></script>

<!-- API 模組（booking-modal 依賴 core / booking；選門市用 store；正規化用 store-data）-->
<script src="js/api/api-core.js?v=20260616-reserve2"></script>
<script src="js/api/api-booking.js?v=20260616-reserve2"></script>
<script src="js/api/api-store.js?v=20260616-reserve2"></script>
<script src="js/store-data.js?v=20260616-reserve2"></script>

<!-- 預約視窗（含「先選門市 → 再選顧問 → 回商城」流程）-->
<script src="js/booking-modal.js?v=20260616-reserve2"></script>

<!-- 落地頁邏輯：擷取商城帶入 → 抓門市 → 彈出視窗 -->
<script src="js/reserve.js?v=20260616-reserve2"></script>

</body>
