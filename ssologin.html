<!doctype html>
<html lang="zh-TW">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="google" content="notranslate">
<title>會員登入中...</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap">
<link rel="stylesheet" href="css/lohas-tokens.css">
<style>
  body{
    min-height:100vh;
    display:flex;align-items:center;justify-content:center;
    background:var(--bg-warm);
    font-family:var(--font-tc);
    color:var(--text-main);
  }
  .sso-box{
    text-align:center;
    padding:48px 32px;
    max-width:420px;
  }

  /* === 雙圈 + 呼吸點動畫 (淺色版) === */
  .sso-mark{
    width:72px;height:72px;
    margin:0 auto 32px;
    position:relative;
  }
  .sso-mark .ring{
    position:absolute;inset:0;
    border:1px solid var(--lohas-bd);
    border-radius:50%;
  }
  .sso-mark .arc{
    position:absolute;inset:0;
    border:1.5px solid transparent;
    border-top-color:var(--lohas-light);
    border-right-color:var(--lohas-light);
    border-radius:50%;
    animation:ssoSpin 1.4s cubic-bezier(.5,0,.5,1) infinite;
  }
  .sso-mark .dot{
    position:absolute;top:50%;left:50%;
    width:6px;height:6px;
    background:var(--lohas-light);
    border-radius:50%;
    transform:translate(-50%,-50%);
    animation:ssoPulse 1.4s ease-in-out infinite;
  }
  @keyframes ssoSpin{to{transform:rotate(360deg)}}
  @keyframes ssoPulse{
    0%,100%{opacity:.3;transform:translate(-50%,-50%) scale(.85)}
    50%{opacity:.75;transform:translate(-50%,-50%) scale(1.15)}
  }

  /* === 文字 === */
  .sso-title{
    font-size:17px;
    letter-spacing:8px;
    color:var(--lohas-hover);
    font-weight:500;
    padding-left:8px;
    margin-bottom:18px;
  }
  .sso-divider{
    width:28px;height:1px;
    background:var(--lohas-bd);
    margin:0 auto 18px;
  }
  .sso-msg{
    font-size:12px;
    letter-spacing:3px;
    color:var(--text-muted);
    line-height:1.8;
    font-weight:400;
    padding-left:3px;
  }

  /* === 錯誤狀態 === */
  .sso-msg.is-err{
    color:var(--err);
    letter-spacing:2px;
  }

  /* === 前往登入 按鈕 === */
  .sso-btn{
    display:inline-block;
    margin-top:28px;
    padding:11px 32px;
    border:1px solid var(--lohas-brand);
    color:var(--lohas-brand);
    background:transparent;
    text-decoration:none;
    font-size:12px;
    letter-spacing:4px;
    font-weight:500;
    border-radius:var(--r-pill);
    transition:all .25s ease;
    padding-left:36px;
  }
  .sso-btn:hover{
    background:var(--lohas-brand);
    color:#fff;
  }
</style>
</head>
<body>
  <div class="sso-box" id="ssoBox">
    <div class="sso-mark" id="ssoMark">
      <div class="ring"></div>
      <div class="arc"></div>
      <div class="dot"></div>
    </div>
    <div class="sso-title">會 員 登 入 中</div>
    <div class="sso-divider"></div>
    <div class="sso-msg" id="ssoMsg">驗 證 身 份 中 , 請 稍 候</div>
  </div>

<script>
(async () => {
  const SSO_VERIFY_URL = 'https://hqdmyxxrskvllkcedybl.supabase.co/functions/v1/store-sso-verify';
  const DEFAULT_NEXT   = '/market.html';

  const url   = new URL(location.href);
  const token = url.searchParams.get('token');
  const next  = url.searchParams.get('next') || DEFAULT_NEXT;

  const box  = document.getElementById('ssoBox');
  const mark = document.getElementById('ssoMark');
  const msg  = document.getElementById('ssoMsg');

  function fail(text, withButton){
    mark.style.display = 'none';
    msg.classList.add('is-err');
    msg.textContent = text;
    if (withButton){
      const btn = document.createElement('a');
      btn.href = '/member-portal.html';
      btn.className = 'sso-btn';
      btn.textContent = '前 往 登 入';
      box.appendChild(btn);
    }
  }

  if (!token) return fail('缺少 SSO token,請從 App 重新進入', true);

  try {
    const res = await fetch(SSO_VERIFY_URL, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ token }),
    });
    const json = await res.json();

    if (!res.ok || !json.ok){
      return fail(json.error || '驗證失敗,請重新登入', true);
    }

    // ===== 寫 localStorage 完成登入 =====
    const member = {
      erpid:   json.erpid,
      erpname: json.erpname,
      erpId:   json.erpid,
      erpName: json.erpname,
      name:    json.erpname,
    };
    localStorage.setItem('lohas_member',    JSON.stringify(member));
    localStorage.setItem('lohas_member_id', json.erpid);

    msg.textContent = '登 入 成 功 , 即 將 跳 轉';

    const target = (next.startsWith('/') && !next.startsWith('//'))
      ? next
      : DEFAULT_NEXT;
    setTimeout(() => { location.replace(target); }, 600);

  } catch (e) {
    console.error(e);
    fail('網路錯誤,請稍後再試', true);
  }
})();
</script>
</body>
</html>
